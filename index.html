<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邱 | 个人主页</title>
  <meta name="description" content="一个普通的代码爱好者，喜欢折腾一些有的没的。">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <p class="hero-greeting reveal">我是</p>
      <h1 class="hero-title reveal">邱</h1>
      <p class="hero-tagline reveal">写代码 / 做有趣的东西</p>
      <div class="hero-cta reveal">
        <a href="#projects" class="btn-text">↓ 项目</a>
      </div>
    </div>
  </section>

  <!-- Projects Section -->
  <section class="section projects" id="projects">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title reveal">项目们</h2>
        <div class="section-line"></div>
      </div>

      <div class="projects-grid">

        <!-- 项目 1 -->
        <article class="project-card reveal">
          <div class="project-image-placeholder">
            <i data-lucide="folder"></i>
          </div>
          <div class="project-content">
            <h3 class="project-title">项目 1</h3>
            <div class="project-links">
              <a href="#" class="project-link" target="_blank" rel="noopener">
                <i data-lucide="github"></i>
                <span>GitHub</span>
              </a>
              <a href="#" class="project-link project-link--demo" target="_blank" rel="noopener">
                <i data-lucide="globe"></i>
                <span>演示</span>
              </a>
            </div>
          </div>
        </article>

        <!-- 项目 2 -->
        <article class="project-card reveal">
          <div class="project-image-placeholder">
            <i data-lucide="folder"></i>
          </div>
          <div class="project-content">
            <h3 class="project-title">项目 2</h3>
            <div class="project-links">
              <a href="#" class="project-link" target="_blank" rel="noopener">
                <i data-lucide="github"></i>
                <span>GitHub</span>
              </a>
              <a href="#" class="project-link project-link--demo" target="_blank" rel="noopener">
                <i data-lucide="globe"></i>
                <span>演示</span>
              </a>
            </div>
          </div>
        </article>

        <!-- 项目 3 -->
        <article class="project-card reveal">
          <div class="project-image-placeholder">
            <i data-lucide="folder"></i>
          </div>
          <div class="project-content">
            <h3 class="project-title">项目 3</h3>
            <div class="project-links">
              <a href="#" class="project-link" target="_blank" rel="noopener">
                <i data-lucide="github"></i>
                <span>GitHub</span>
              </a>
              <a href="#" class="project-link project-link--demo" target="_blank" rel="noopener">
                <i data-lucide="globe"></i>
                <span>演示</span>
              </a>
            </div>
          </div>
        </article>

      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      lucide.createIcons();
    });
  </script>
</body>
</html>
