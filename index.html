<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邱 | 个人主页</title>
  <meta name="description" content="一个普通的代码爱好者，喜欢折腾一些有的没的。">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <p class="hero-greeting reveal">你好，我是</p>
      <h1 class="hero-title reveal">邱</h1>
      <p class="hero-tagline reveal">写代码 / 做有趣的东西</p>
      <div class="hero-cta reveal">
        <a href="#projects" class="btn-text">↓ 项目</a>
      </div>
    </div>
    <div class="scroll-indicator reveal">
      <i data-lucide="chevron-down"></i>
    </div>
  </section>

  <!-- Projects Section -->
  <section class="section projects" id="projects">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title reveal">项目们</h2>
        <div class="section-line"></div>
      </div>

      <div class="projects-grid">

        <!-- 项目 1 - 待填充 -->
        <article class="project-card project-card--empty reveal" data-year="2024">
          <div class="project-image-placeholder">
            <i data-lucide="plus"></i>
            <span>项目 1</span>
          </div>
          <div class="project-content">
            <div class="project-meta">
              <span class="project-year">2024</span>
              <div class="project-tags">
                <span class="tag">技术栈</span>
              </div>
            </div>
            <h3 class="project-title">项目名称</h3>
            <p class="project-desc">项目简介，来自 GitHub README...</p>
            <div class="project-links">
              <a href="#" class="project-link">
                <i data-lucide="github"></i>
                <span>源码</span>
              </a>
              <a href="#" class="project-link project-link--demo">
                <i data-lucide="external-link"></i>
                <span>在线体验</span>
              </a>
            </div>
          </div>
        </article>

        <!-- 项目 2 - 待填充 -->
        <article class="project-card project-card--empty reveal" data-year="2024">
          <div class="project-image-placeholder">
            <i data-lucide="plus"></i>
            <span>项目 2</span>
          </div>
          <div class="project-content">
            <div class="project-meta">
              <span class="project-year">2024</span>
              <div class="project-tags">
                <span class="tag">技术栈</span>
              </div>
            </div>
            <h3 class="project-title">项目名称</h3>
            <p class="project-desc">项目简介，来自 GitHub README...</p>
            <div class="project-links">
              <a href="#" class="project-link">
                <i data-lucide="github"></i>
                <span>源码</span>
              </a>
              <a href="#" class="project-link project-link--demo">
                <i data-lucide="external-link"></i>
                <span>在线体验</span>
              </a>
            </div>
          </div>
        </article>

        <!-- 项目 3 - 待填充 -->
        <article class="project-card project-card--empty reveal" data-year="2023">
          <div class="project-image-placeholder">
            <i data-lucide="plus"></i>
            <span>项目 3</span>
          </div>
          <div class="project-content">
            <div class="project-meta">
              <span class="project-year">2023</span>
              <div class="project-tags">
                <span class="tag">技术栈</span>
              </div>
            </div>
            <h3 class="project-title">项目名称</h3>
            <p class="project-desc">项目简介，来自 GitHub README...</p>
            <div class="project-links">
              <a href="#" class="project-link">
                <i data-lucide="github"></i>
                <span>源码</span>
              </a>
              <a href="#" class="project-link project-link--demo">
                <i data-lucide="external-link"></i>
                <span>在线体验</span>
              </a>
            </div>
          </div>
        </article>

      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
